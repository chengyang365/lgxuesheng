            if (!modalState.show) return null;

            const promptInputRef = useRef(null);

            // 聚焦 prompt 输入框
            useEffect(() => {
                if (modalState.show && modalState.type === 'prompt' && promptInputRef.current) {
                    setTimeout(() => promptInputRef.current.focus(), 100);

        function App() {
            // 获取本地时间字符串

                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                return now.toISOString().slice(0, 16);
            };

            const [activeTab, setActiveTab] = useState('entry');
            const [editingId, setEditingId] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [showClassManager, setShowClassManager] = useState(false);
            
            // --- 弹窗状态 ---
            const [modalState, setModalState] = useState({
                show: false, type: 'confirm', title: '', message: '', defaultValue: '', isDangerous: false, onConfirm: null,
            });

            // 数据相关状态
            const [classData, setClassData] = useState(() => {
                try {
                    const saved = localStorage.getItem('student_tracker_class_data');
                    return saved ? JSON.parse(saved) : DEFAULT_CLASS_DATA;
                } catch { return DEFAULT_CLASS_DATA; }
            });

            const [eventName, setEventName] = useState('');

            const [selectedClass, setSelectedClass] = useState(Object.keys(DEFAULT_CLASS_DATA)[0]);
            const [selectedStudents, setSelectedStudents] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [historyFilter, setHistoryFilter] = useState('ALL');
            
            const [records, setRecords] = useState(() => {
                try {
                    const saved = localStorage.getItem('student_tracker_records');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });
            const [toast, setToast] = useState({ show: false, msg: '', type: 'success' });
            const toastTimer = useRef(null);
            const fileInputRef = useRef(null);
            const settingsRef = useRef(null);

            // --- 班级管理状态 ---
            const [managerSelectedClass, setManagerSelectedClass] = useState(Object.keys(DEFAULT_CLASS_DATA)[0]);
            const [newStudentName, setNewStudentName] = useState('');

            // --- 持久化 (加入防抖保护) ---
            useDebounceEffect(() => {
                localStorage.setItem('student_tracker_records', JSON.stringify(records));
            }, [records], 800);

            useDebounceEffect(() => {
                localStorage.setItem('student_tracker_class_data', JSON.stringify(classData));
            }, [classData], 800);

            // 安全检查
            useEffect(() => {
                const availableClasses = Object.keys(classData);
                if (availableClasses.length > 0 && !availableClasses.includes(selectedClass)) {
                    setSelectedClass(availableClasses[0]);
                }
            }, [classData, selectedClass]);
            
            // 同步管理界面的选中状态
            useEffect(() => {
                const availableClasses = Object.keys(classData);
                if (availableClasses.length > 0 && !availableClasses.includes(managerSelectedClass)) {
                    setManagerSelectedClass(availableClasses[0]);
                }
            }, [classData, managerSelectedClass]);

            // 点击外部关闭设置面板
            useEffect(() => {
                function handleClickOutside(event) {
                    if (settingsRef.current && !settingsRef.current.contains(event.target) && showSettings) {
                        setShowSettings(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, [showSettings]);

            // 切换班级时重置搜索
            useEffect(() => {
                if (!editingId && !showClassManager) {
                    setSearchTerm('');
                }
            }, [selectedClass]);

            const showToast = (msg, type = 'success') => {
                if (toastTimer.current) clearTimeout(toastTimer.current);
                setToast({ show: true, msg, type });
                toastTimer.current = setTimeout(() => setToast({ show: false, msg: '', type: 'success' }), 2500);
            };

            // --- 自定义弹窗逻辑 ---
            const showDialog = (options) => {
                setModalState({
                    show: true,
                    type: options.type || 'confirm',
                    title: options.title || '提示',
                    message: options.message || '',
                    defaultValue: options.defaultValue || '',
                    isDangerous: options.isDangerous || false,
                    onConfirm: options.onConfirm,
                });
            };

            const closeDialog = () => {
                setModalState(prev => ({ ...prev, show: false }));
            };

            const handleDialogConfirm = (inputValue) => {
                if (modalState.onConfirm) {
                    modalState.onConfirm(inputValue);
                }
                closeDialog();
            };

            // --- 核心业务逻辑 ---
            const toggleStudent = (name) => {
                setSelectedStudents(prev => 
                    prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]
                );
            };

            const toggleSelectAll = () => {
                const all = classData[selectedClass] || [];
                const targets = searchTerm ? filteredStudents : all;
                const allTargetsSelected = targets.every(s => selectedStudents.includes(s));
                
                if (allTargetsSelected) {
                    setSelectedStudents(prev => prev.filter(s => !targets.includes(s)));
                } else {
                    const newSelected = [...selectedStudents];
                    targets.forEach(t => { if (!newSelected.includes(t)) newSelected.push(t); });
                    setSelectedStudents(newSelected);
                }
            };
            
            const clearSelection = () => {
                showDialog({
                    type: 'confirm',
                    title: '清空选择',
                    message: '确定要清空当前所有已选学生吗？',
                    isDangerous: true,
                    onConfirm: () => setSelectedStudents([])
                });
            };

            const handleSave = () => {
                if (!eventName.trim()) return showToast("请输入事项名称", "error");
                if (selectedStudents.length === 0) return showToast("请选择至少一名学生", "error");

                const dateObj = new Date(recordDate);
                const involvedClassesSet = new Set();
                selectedStudents.forEach(stu => {
                    for (const [cls, students] of Object.entries(classData)) {
                        if (students.includes(stu)) {
                            involvedClassesSet.add(cls);
                            break;
                        }
                    }
                });
                const involvedClasses = Array.from(involvedClassesSet).sort();
                const derivedClassName = involvedClasses.length > 0 ? involvedClasses.join(' & ') : selectedClass;

                const recordData = {
                    date: dateObj.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                    fullDate: dateObj.toLocaleString('zh-CN', { year: 'numeric', month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
                    eventName: eventName.trim(),
                    className: derivedClassName,
                    students: selectedStudents,
                };

                if (editingId) {
                    setRecords(prev => prev.map(r => r.id === editingId ? { ...r, ...recordData } : r));
                    showToast("✅ 记录已更新");
                    setEditingId(null);
                } else {
                    setRecords(prev => [{ id: Date.now(), ...recordData }, ...prev]);
                    showToast("✅ 记录已保存");
                }
                
                setEventName('');
                setSelectedStudents([]);
                setSearchTerm('');
                setRecordDate(getLocalISOString());
                if(editingId) setActiveTab('report');
            };

            const deleteRecord = (id) => {
                showDialog({
                    type: 'confirm',
                    title: '删除记录',
                    message: '确定要删除这条记录吗？此操作无法撤销。',
                    isDangerous: true,
                    onConfirm: () => {
                        setRecords(prev => prev.filter(r => r.id !== id));
                        showToast("🗑️ 已删除");
                    }
                });
            };

            const editRecord = (record) => {
                setEditingId(record.id);
                setEventName(record.eventName);
                const firstClass = record.className.split(' & ')[0];
                if (classData[firstClass]) {
                    setSelectedClass(firstClass);
                }
                setSelectedStudents([...record.students]);
                setActiveTab('entry');
                showToast("📝 进入编辑模式", "success");
            };

            // 升级采用现代 Clipboard API
            const copyRecord = async (r) => {
                const studentList = r.students.map((s, i) => `${i + 1}. ${s}`).join('\n');
                const text = `📅 ${r.fullDate}\n🏫 ${r.className}\n📝 ${r.eventName}\n👥 名单 (${r.students.length}人):\n${studentList}`;
                
                try {
                    await navigator.clipboard.writeText(text);
                    showToast("📋 已复制内容");
                } catch (err) {
                    showToast("❌ 复制失败，请检查浏览器权限", "error");
                }
            };

            // --- 班级名单管理逻辑 ---
            const addClass = () => {
                showDialog({
                    type: 'prompt',
                    title: '新建班级',
                    message: '请输入新班级名称 (例如: 5A, 篮球队):',
                    onConfirm: (val) => {
                        const className = val && val.trim();
                        if (!className) return;
                        if (classData[className]) {
                            showToast("❌ 班级已存在", "error");
                            return;
                        }
                        setClassData(prev => ({ ...prev, [className]: [] }));
                        setManagerSelectedClass(className);
                        showToast("✅ 班级已创建");
                    }
                });
            };

            const deleteClass = (className) => {
                if (Object.keys(classData).length <= 1) {
                    showToast("⚠️ 至少保留一个班级", "error");
                    return;
                }
                
                showDialog({
                    type: 'confirm',
                    title: '删除班级',
                    message: `确定要删除班级 "${className}" 吗？该班级的所有学生名单将被清空（不影响历史记录）。`,
                    isDangerous: true,
                    onConfirm: () => {
                        setClassData(prev => {
                            const newData = { ...prev };
                            delete newData[className];
                            return newData;
                        });
                        showToast("🗑️ 班级已删除");
                    }
                });
            };

            const addStudent = () => {
                if (!newStudentName.trim()) return;
                const currentList = classData[managerSelectedClass] || [];
                if (currentList.includes(newStudentName.trim())) {
                    showToast("❌ 学生已存在", "error");
                    return;
                }
                setClassData(prev => ({
                    ...prev,
                    [managerSelectedClass]: [...(prev[managerSelectedClass] || []), newStudentName.trim()]
                }));
                setNewStudentName('');
                showToast("✅ 学生已添加");
            };

            const removeStudent = (name) => {
                showDialog({
                    type: 'confirm',
                    title: '删除学生',
                    message: `确定从名单中移除 "${name}" 吗？`,
                    isDangerous: true,
                    onConfirm: () => {
                        setClassData(prev => ({
                            ...prev,
                            [managerSelectedClass]: prev[managerSelectedClass].filter(s => s !== name)
                        }));
                    }
                });
            };

            const renameStudent = (oldName) => {
                showDialog({
                    type: 'prompt',
                    title: '重命名学生',
                    defaultValue: oldName,
                    onConfirm: (newName) => {
                        if (newName && newName.trim() !== oldName) {
                            setClassData(prev => ({
                                ...prev,
                                [managerSelectedClass]: prev[managerSelectedClass].map(s => s === oldName ? newName.trim() : s)
                            }));
                            showToast("✅ 名字已修改");
                        }
                    }
                });
            };

            const resetClassData = () => {
                showDialog({
                    type: 'confirm',
                    title: '恢复默认',
                    message: '警告：确定要重置所有班级名单吗？这将恢复到初始状态，您创建的新班级将丢失。',
                    isDangerous: true,
                    onConfirm: () => {
                        setClassData(DEFAULT_CLASS_DATA);
                        showToast("已恢复默认名单");
                    }
                });
            }

            // --- 导入导出逻辑 ---
            const exportData = () => {
                const data = { records, classData };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "student_tracker_backup_" + new Date().toISOString().slice(0,10) + ".json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                showToast("💾 数据已导出");
                setShowSettings(false);
            };

            const importData = (event) => {
                const fileReader = new FileReader();
                fileReader.readAsText(event.target.files[0], "UTF-8");
                fileReader.onload = e => {
                    try {
                        const importedData = JSON.parse(e.target.result);
                        let newRecords = [];
                        let newClassData = null;

                        if (Array.isArray(importedData)) {
                            newRecords = importedData;
                        } else {
                            newRecords = importedData.records || [];
                            newClassData = importedData.classData;
                        }

                        showDialog({
                            type: 'confirm',
                            title: '导入数据',
                            message: `检测到 ${newRecords.length} 条记录。确定导入吗？这将覆盖当前数据。`,
                            onConfirm: () => {
                                setRecords(newRecords);
                                if (newClassData) setClassData(newClassData);
                                showToast("✅ 数据导入成功");
                                setShowSettings(false);
                            }
                        });
                    } catch (err) {
                        showToast("❌ 读取文件失败", "error");
                    }
                };
            };

            // 过滤与计算
            const filteredStudents = useMemo(() => {
                const list = classData[selectedClass] || [];
                if (!searchTerm) return list;
                const lowerTerm = searchTerm.toLowerCase();
                return list.filter(s => s.toLowerCase().includes(lowerTerm));
            }, [selectedClass, searchTerm, classData]);

            const filteredRecords = useMemo(() => {
                if (historyFilter === 'ALL') return records;
                return records.filter(r => r.className.includes(historyFilter));
            }, [records, historyFilter]);

            const hasSelectionInClass = (cls) => {
                const studentsInClass = classData[cls] || [];
                return studentsInClass.some(s => selectedStudents.includes(s));
            };

            return (
                <div className="min-h-screen pb-28 max-w-md mx-auto bg-slate-50 md:border-x md:border-slate-200 md:shadow-2xl relative overflow-hidden">
                    <DialogModal 
                        modalState={modalState} 
                        closeDialog={closeDialog} 
                        handleDialogConfirm={handleDialogConfirm} 
                    />

                    {/* 顶部导航 (Glass) */}
                    <div className="sticky top-0 z-30 glass px-5 py-4">
                        <div className="flex items-center justify-between mb-4">
                            <h1 className="text-xl font-bold text-slate-800 flex items-center gap-2.5 tracking-tight">
                                <span className="bg-primary-600 text-white p-2 rounded-xl shadow-glow">
                                    <Users size={20} />
                                </span>
                                学生记录助手
                            </h1>
                            <div className="relative" ref={settingsRef}>
                                <button onClick={() => setShowSettings(!showSettings)} className={`p-2.5 rounded-xl transition-all ${showSettings ? 'bg-primary-50 text-primary-600 ring-2 ring-primary-100' : 'bg-slate-100/50 text-slate-500 hover:bg-slate-100'}`}>
                                    <Settings size={20} />
                                </button>
                                
                                {/* 设置面板 (Dropdown) */}
                                {showSettings && (
                                    <div className="absolute right-0 top-full mt-3 w-64 bg-white rounded-2xl shadow-xl border border-slate-100 p-2 animate-scale-in z-50 origin-top-right">
                                        <button 
                                            onClick={() => { setShowClassManager(true); setShowSettings(false); }}
                                            className="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-bold text-slate-700 hover:bg-slate-50 transition-colors text-left"
                                        >
                                            <div className="bg-primary-50 p-1.5 rounded-lg text-primary-600"><Edit2 size={16} /></div>
                                            管理班级名单
                                        </button>
                                        <div className="h-px bg-slate-100 my-1"></div>
                                        <button onClick={exportData} className="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors text-left">
                                            <div className="bg-slate-100 p-1.5 rounded-lg text-slate-500"><Download size={16} /></div> 导出备份
                                        </button>
                                        <div className="relative">
                                            <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-50 transition-colors text-left">
                                                <div className="bg-slate-100 p-1.5 rounded-lg text-slate-500"><Upload size={16} /></div> 恢复数据
                                            </button>
                                            <input type="file" ref={fileInputRef} onChange={importData} className="hidden" accept=".json" />
                                        </div>
                                        
                                        {/* 数据安全提醒 (优化建议) */}
                                        <div className="px-3 py-2.5 mx-1 mb-1 mt-2 bg-amber-50 rounded-xl border border-amber-100">
                                            <div className="flex items-center gap-1.5 text-amber-700 font-bold text-[11px] mb-1">
                                                <AlertTriangle size={14} /> <span>数据安全提醒</span>
                                            </div>
                                            <p className="text-[10px] text-amber-600/90 leading-relaxed">
                                                数据目前仅保存在浏览器缓存中。清除浏览器数据会导致记录丢失，建议定期点击上方进行<span className="font-bold underline ml-0.5">导出备份</span>。
                                            </p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Tabs */}
                        <div className="bg-slate-100/80 p-1 rounded-2xl flex relative">
                            <div className={`absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white rounded-xl shadow-sm transition-all duration-300 ease-out ${activeTab === 'entry' ? 'left-1' : 'left-[calc(50%+2px)]'}`}></div>
                            <button onClick={() => setActiveTab('entry')} className={`flex-1 relative z-10 py-2 text-sm font-bold text-center rounded-xl transition-colors ${activeTab === 'entry' ? 'text-primary-700' : 'text-slate-500'}`}>
                                {editingId ? '编辑中...' : '录入'}
                            </button>
                            <button onClick={() => setActiveTab('report')} className={`flex-1 relative z-10 py-2 text-sm font-bold text-center rounded-xl transition-colors ${activeTab === 'report' ? 'text-primary-700' : 'text-slate-500'}`}>
                                历史记录
                            </button>
                        </div>
                    </div>

                    {/* Toast */}
                    <div className={`fixed top-28 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 pointer-events-none ${toast.show ? 'opacity-100 translate-y-0' : 'opacity-0 -translate-y-4'}`}>
                        <div className={`px-5 py-3 rounded-2xl shadow-2xl text-sm font-bold flex items-center gap-3 ${toast.type === 'error' ? 'bg-red-500 text-white shadow-red-200' : 'bg-slate-800 text-white shadow-slate-300'}`}>
                            {toast.type === 'error' ? <AlertTriangle size={18} /> : <Check size={18} />}
                            {toast.msg}
                        </div>
                    </div>

                    {/* 班级名单管理 Modal */}
                    {showClassManager && (
                        <div className="fixed inset-0 z-50 bg-slate-50 flex flex-col animate-slide-up">
                            <div className="glass px-5 py-4 flex items-center justify-between sticky top-0 z-10">
                                <h2 className="text-xl font-bold text-slate-800">管理班级名单</h2>
                                <button onClick={() => setShowClassManager(false)} className="p-2 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200"><X size={24} /></button>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-5 pb-24">
                                {/* 班级选择 Tab - 含新增按钮 */}
                                <div className="flex gap-3 mb-6 overflow-x-auto no-scrollbar items-center pb-2">
                                    {Object.keys(classData).map(cls => (
                                        <button 
                                            key={cls} 
                                            onClick={() => setManagerSelectedClass(cls)} 
                                            className={`px-5 py-2.5 rounded-2xl text-sm font-bold whitespace-nowrap border-2 transition-all tap-effect ${managerSelectedClass === cls ? 'bg-primary-600 text-white border-primary-600 shadow-lg shadow-primary-200' : 'bg-white text-slate-600 border-slate-100 hover:border-slate-200'}`}
                                        >
                                            {cls}
                                        </button>
                                    ))}
                                    <button 
                                        onClick={addClass}
                                        className="px-4 py-2.5 rounded-2xl border-2 border-dashed border-primary-300 text-primary-600 hover:bg-primary-50 hover:border-primary-400 flex items-center gap-2 transition-colors whitespace-nowrap tap-effect"
                                    >
                                        <Plus size={18} /> <span className="text-xs font-bold">新班级</span>
                                    </button>
                                </div>

                                {/* 添加学生输入框 */}
                                <div className="bg-white p-2 rounded-2xl border border-slate-100 shadow-soft mb-6 flex gap-2 focus-within:ring-2 focus-within:ring-primary-100 transition-all">
                                    <input 
                                        type="text" 
                                        value={newStudentName}
                                        onChange={(e) => setNewStudentName(e.target.value)}
                                        placeholder={`添加学生到 ${managerSelectedClass}...`}
                                        className="flex-1 outline-none text-base px-3 text-slate-700 placeholder:text-slate-400"
                                    />
                                    <button onClick={addStudent} className="bg-primary-600 text-white p-3 rounded-xl hover:bg-primary-700 disabled:opacity-50 tap-effect transition-colors" disabled={!newStudentName.trim()}>
                                        <UserPlus size={20} />
                                    </button>
                                </div>

                                {/* 学生列表 */}
                                <div className="space-y-3">
                                    {(classData[managerSelectedClass] || []).map((stu, index) => (
                                        <div key={stu} className="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between group hover:border-primary-100 transition-colors">
                                            <div className="flex items-center gap-4 overflow-hidden">
                                                <span className="text-xs font-bold text-slate-300 w-6 flex-shrink-0 text-center bg-slate-50 py-1 rounded-md">{index + 1}</span>
                                                <span className="text-sm font-bold text-slate-700 truncate">{stu}</span>
                                            </div>
                                            <div className="flex gap-2 flex-shrink-0">
                                                <button onClick={() => renameStudent(stu)} className="p-2 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-xl transition-colors"><Edit2 size={18} /></button>
                                                <button onClick={() => removeStudent(stu)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors"><Trash2 size={18} /></button>
                                            </div>
                                        </div>
                                    ))}
                                    {(classData[managerSelectedClass] || []).length === 0 && (
                                        <div className="flex flex-col items-center justify-center py-12 text-slate-400">
                                            <div className="bg-slate-100 p-4 rounded-full mb-3"><Users size={32} className="opacity-40" /></div>
                                            <p className="text-sm font-medium">此班级暂无学生</p>
                                        </div>
                                    )}
                                </div>
                                
                                {/* 删除班级按钮 */}
                                <div className="flex justify-center mt-8 mb-4">
                                    <button 
                                        onClick={() => deleteClass(managerSelectedClass)} 
                                        className="text-red-500 text-xs font-bold px-5 py-3 border border-red-100 bg-red-50 rounded-xl hover:bg-red-100 flex items-center gap-2 tap-effect transition-colors"
                                    >
                                        <Trash2 size={16} /> 删除当前班级 ({managerSelectedClass})
                                    </button>
                                </div>
                            </div>

                            <div className="glass px-5 py-4 safe-bottom">
                                <button onClick={resetClassData} className="w-full text-xs font-medium text-slate-400 hover:text-red-500 py-2 flex items-center justify-center gap-2 transition-colors">
                                    <RefreshCw size={14} /> 恢复默认名单
                                </button>
                            </div>
                        </div>
                    )}

                    <main className="p-5">
                        {activeTab === 'entry' ? (
                            <div className="space-y-8 animate-slide-up">
                                {editingId && (
                                    <div className="bg-amber-50 border border-amber-200 text-amber-800 px-5 py-3 rounded-2xl text-sm font-medium flex justify-between items-center shadow-sm">
                                        <div className="flex items-center gap-2"><Edit2 size={16}/> 正在编辑旧记录</div>
                                        <button onClick={() => { setEditingId(null); setEventName(''); setSelectedStudents([]); }} className="bg-white/50 px-3 py-1 rounded-lg text-xs font-bold hover:bg-white hover:text-amber-900 transition-colors">取消</button>
                                    </div>
                                )}

                                {/* 1. 日期与事项 (合并卡片) */}
                                <div className="bg-white p-5 rounded-3xl shadow-soft border border-white/50 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-24 h-24 bg-primary-50 rounded-full -mr-10 -mt-10 opacity-50 blur-2xl pointer-events-none"></div>
                                    
                                    <label className="text-xs font-extrabold text-slate-400 uppercase tracking-widest mb-3 block ml-1">记录详情</label>
                                    
                                    {/* 日期 */}
                                    <div className="bg-slate-50 p-3 rounded-2xl flex items-center gap-3 mb-4 border border-slate-100 focus-within:border-primary-300 focus-within:ring-2 focus-within:ring-primary-100 transition-all">
                                        <div className="text-slate-400"><Clock size={18} /></div>
                                        <input 
                                            type="datetime-local" 
                                            value={recordDate}
                                            onChange={(e) => setRecordDate(e.target.value)}
                                            className="text-sm font-bold text-slate-700 bg-transparent outline-none w-full"
                                        />
                                    </div>

                                    {/* 事项 */}
                                    <div className="relative mb-4">
                                        <input
                                            type="text"
                                            value={eventName}
                                            onChange={(e) => setEventName(e.target.value)}
                                            placeholder="输入事项 (例如: 缺席)"
                                            className="w-full text-xl font-bold text-slate-800 placeholder:text-slate-300 outline-none bg-transparent border-b-2 border-slate-100 py-2 focus:border-primary-500 transition-colors"
                                        />
                                        {eventName && <button onClick={() => setEventName('')} className="absolute right-0 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 p-2"><XCircle size={20} /></button>}
                                    </div>
                                    
                                    {/* 快捷标签 (Capsules) */}
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 -mx-5 px-5 pt-1">
                                        {QUICK_TAGS.map(tag => (
                                            <button 
                                                key={tag} 
                                                onClick={() => setEventName(tag)} 
                                                className={`whitespace-nowrap px-4 py-2 rounded-full text-xs font-bold transition-all tap-effect border ${eventName === tag ? 'bg-primary-600 text-white border-primary-600 shadow-md shadow-primary-200' : 'bg-white text-slate-600 border-slate-200 hover:border-primary-300'}`}
                                            >
                                                {tag}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* 2. 班级选择 */}
                                <div>
                                    <label className="text-xs font-extrabold text-slate-400 uppercase tracking-widest ml-1 mb-3 block">选择班级</label>
                                    <div className="flex gap-3 overflow-x-auto no-scrollbar pb-2 -mx-5 px-5">
                                        {Object.keys(classData).map(cls => {
                                            const hasActive = hasSelectionInClass(cls);
                                            const isActive = selectedClass === cls;
                                            return (
                                                <button
                                                    key={cls}
                                                    onClick={() => setSelectedClass(cls)}
                                                    className={`relative whitespace-nowrap px-6 py-3 rounded-2xl text-sm font-bold transition-all tap-effect border-2 ${isActive ? 'bg-slate-800 border-slate-800 text-white shadow-lg shadow-slate-200' : 'bg-white border-slate-100 text-slate-600 hover:border-slate-200'}`}
                                                >
                                                    {cls}
                                                    {hasActive && (
                                                        <span className={`absolute -top-1 -right-1 w-4 h-4 flex items-center justify-center rounded-full border-2 border-white bg-primary-500`}>
                                                            <span className="w-1.5 h-1.5 bg-white rounded-full"></span>
                                                        </span>
                                                    )}
                                                </button>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* 3. 学生选择与搜索 */}
                                <div>
                                    <div className="flex justify-between items-end mb-4 px-1">
                                        <label className="text-xs font-extrabold text-slate-400 uppercase tracking-widest">
                                            学生名单 
                                            {selectedStudents.length > 0 && <span className="ml-2 text-primary-600 bg-primary-50 px-2 py-0.5 rounded-md">已选 {selectedStudents.length}</span>}
                                        </label>
                                        <div className="flex gap-2">
                                            {selectedStudents.length > 0 && (
                                                <button onClick={clearSelection} className="text-slate-400 text-xs font-bold px-3 py-1.5 bg-slate-100 rounded-lg hover:bg-red-50 hover:text-red-500 transition-colors">
                                                    清空
                                                </button>
                                            )}
                                            <button onClick={toggleSelectAll} className="text-primary-600 text-xs font-bold px-3 py-1.5 bg-primary-50 rounded-lg hover:bg-primary-100 transition-colors">
                                                {selectedStudents.length > 0 && (selectedStudents.length >= filteredStudents.length + (selectedStudents.length - filteredStudents.filter(s => selectedStudents.includes(s)).length)) ? '取消全选' : '全选'}
                                            </button>
                                        </div>
                                    </div>

                                    {/* 搜索框 */}
                                    <div className="relative mb-4 group">
                                        <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary-500 transition-colors"><Search size={18} /></div>
                                        <input 
                                            type="text" 
                                            value={searchTerm}
                                            onChange={(e) => setSearchTerm(e.target.value)}
                                            placeholder={`搜索 ${selectedClass} 学生...`}
                                            className="w-full bg-white pl-11 pr-10 py-3.5 rounded-2xl text-sm font-medium border border-slate-100 shadow-sm focus:border-primary-500 focus:ring-4 focus:ring-primary-50/50 outline-none transition-all"
                                        />
                                        {searchTerm && <button onClick={() => setSearchTerm('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-300 hover:text-slate-500 p-1"><XCircle size={16} /></button>}
                                    </div>
                                    
                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-3 min-h-[200px] content-start">
                                        {filteredStudents.length > 0 ? (
                                            filteredStudents.map(stu => {
                                                const active = selectedStudents.includes(stu);
                                                return (
                                                    <button
                                                        key={stu}
                                                        onClick={() => toggleStudent(stu)}
                                                        className={`relative min-h-[4rem] h-auto py-3 px-3 rounded-2xl text-xs font-bold transition-all duration-200 tap-effect flex items-center justify-center border-2 leading-tight text-center break-words select-none ${active ? 'bg-primary-50 border-primary-500 text-primary-700 shadow-inner' : 'bg-white border-transparent shadow-sm text-slate-600 hover:border-slate-200'}`}
                                                    >
                                                        {stu}
                                                        {active && <div className="absolute -top-1.5 -right-1.5 bg-primary-500 text-white rounded-full p-0.5 border-2 border-white shadow-sm animate-scale-in"><Check size={10} strokeWidth={4} /></div>}
                                                    </button>
                                                )
                                            })
                                        ) : (
                                            <div className="col-span-full flex flex-col items-center justify-center py-12 text-slate-400">
                                                <div className="bg-slate-100 p-4 rounded-full mb-3"><Search size={24} className="opacity-40"/></div>
                                                <p className="text-sm">未找到 "{searchTerm}"</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-slide-up">
                                {/* 筛选器 */}
                                {records.length > 0 && (
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2 -mx-5 px-5 sticky top-20 z-10 bg-gradient-to-b from-slate-50 via-slate-50 to-transparent pt-2">
                                        <button onClick={() => setHistoryFilter('ALL')} className={`px-4 py-2 rounded-xl text-xs font-bold border transition-all shadow-sm ${historyFilter === 'ALL' ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-100'}`}>全部</button>
                                        {Object.keys(classData).map(cls => (
                                            <button key={cls} onClick={() => setHistoryFilter(cls)} className={`px-4 py-2 rounded-xl text-xs font-bold border transition-all shadow-sm ${historyFilter === cls ? 'bg-primary-600 text-white border-primary-600' : 'bg-white text-slate-500 border-slate-100'}`}>
                                                {cls}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                {filteredRecords.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center py-24 text-slate-300">
                                        <div className="bg-white p-8 rounded-full mb-6 shadow-soft"><ListIcon size={48} className="text-slate-200" /></div>
                                        <p className="font-bold text-slate-400">暂无{historyFilter !== 'ALL' ? `${historyFilter}` : ''}记录</p>
                                        <button onClick={() => setActiveTab('entry')} className="mt-4 text-primary-600 text-sm font-bold hover:underline">去录入一条?</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {filteredRecords.map(r => (
                                            <div key={r.id} className="bg-white p-5 rounded-3xl shadow-soft border border-white/60 relative group hover:shadow-lg transition-shadow">
                                                {/* 左侧装饰条 */}
                                                <div className="absolute left-0 top-6 bottom-6 w-1 bg-gradient-to-b from-primary-400 to-primary-600 rounded-r-full"></div>
                                                
                                                <div className="pl-3">
                                                    <div className="flex justify-between items-start mb-3">
                                                        <div>
                                                            <div className="flex items-center gap-2 text-xs font-bold text-slate-400 mb-1.5 uppercase tracking-wide">
                                                                <span className="bg-slate-100 px-2 py-0.5 rounded-md text-slate-500 border border-slate-200">{r.className}</span>
                                                                <span>{r.fullDate.split(' ')[0]}</span>
                                                            </div>
                                                            <h3 className="text-lg font-bold text-slate-800 leading-tight">{r.eventName}</h3>
                                                        </div>
                                                        <div className="flex gap-1">
                                                            <button onClick={() => editRecord(r)} className="p-2.5 text-slate-400 hover:text-primary-600 hover:bg-primary-50 rounded-xl transition-colors"><Edit2 size={18} /></button>
                                                            <button onClick={() => copyRecord(r)} className="p-2.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-colors"><Copy size={18} /></button>
                                                            <button onClick={() => deleteRecord(r.id)} className="p-2.5 text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition-colors"><Trash2 size={18} /></button>
                                                        </div>
                                                    </div>
                                                    <div className="bg-slate-50/50 rounded-xl p-3 border border-slate-100/50">
                                                        <div className="flex flex-wrap gap-2">
                                                            {r.students.map((s, i) => (
                                                                <span key={i} className="text-xs font-medium text-slate-600 bg-white border border-slate-200/60 px-2 py-1 rounded-md shadow-sm">
                                                                    <span className="text-slate-300 font-bold mr-1">{i + 1}.</span>{s}
                                                                </span>
                                                            ))}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                
                                {records.length > 0 && (
                                    <div className="text-center pb-8 pt-6">
                                        <button onClick={() => { 
                                            showDialog({
                                                type: 'confirm',
                                                title: '清空历史',
                                                message: '确定要清空所有历史记录吗？此操作无法撤销。',
                                                isDangerous: true,
                                                onConfirm: () => setRecords([])
                                            });
                                        }} className="text-xs font-bold text-slate-300 hover:text-red-500 transition-colors flex items-center justify-center gap-1 mx-auto">
                                            <Trash2 size={12}/> 清空所有历史
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* 底部悬浮按钮 (Glass) */}
                    {activeTab === 'entry' && (
                        <div className="fixed bottom-0 left-0 right-0 glass px-5 py-4 z-20">
                            <div className="max-w-md mx-auto">
                                <button onClick={handleSave} className={`w-full text-white shadow-xl shadow-slate-300/50 rounded-2xl p-1.5 pr-3 flex items-center justify-between group tap-effect transition-all ${editingId ? 'bg-amber-500 hover:bg-amber-600' : 'bg-slate-900 hover:bg-slate-800'}`}>
                                    <div className={`rounded-xl px-5 py-3.5 flex items-center gap-2.5 transition-colors ${editingId ? 'bg-amber-600' : 'bg-slate-800'}`}>
                                        <span className="text-white/70 text-xs font-bold uppercase tracking-wider">已选</span>
                                        <span className="text-xl font-black text-white min-w-[1.5rem] text-center">{selectedStudents.length}</span>
                                    </div>
                                    <div className="flex items-center gap-3 pr-4">
                                        <span className="font-bold text-lg tracking-wide">{editingId ? '更新记录' : '保存记录'}</span>
                                        <Save size={20} className="text-white/80 group-hover:text-white transition-colors" />
                                    </div>
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
